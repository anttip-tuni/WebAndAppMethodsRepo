<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --stroke-color: rgb(132, 136, 255);
        }

        body {
            font-family: "Inter", sans-serif;
        }

        h1 {
            font-size: 4rem;
        }

        .exampleContainer {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #shadow h1 {
            text-shadow: 6px 6px 5px rgba(0, 0, 0, 0.165);
            /* offset-x offset-y blur-radius color */
        }

        #glow {
            background-color: rgb(32, 31, 50);
            color: aliceblue;
        }

        #glow h1 {
            text-shadow: 0 0 10px rgba(244, 244, 255, 0.8),
                0 0 20px rgba(244, 244, 255, 0.6),
                0 0 40px rgba(201, 201, 228, 0.4)
        }

        #threedee {
            background-color: rgb(21, 37, 16);
            color: white;
        }

        #threedee h1 {
            text-shadow: 1px 1px 0 #ccc,
                2px 2px 0 #bbb,
                3px 3px 0 #aaa,
                4px 4px 0 #999,
                5px 5px 0 #888,
                6px 6px 0 #777;
        }

        #stroke {
            background-color: black;
        }

        #stroke h1 {
            -webkit-text-stroke: 2px rgb(255, 102, 0);
            color: rgb(108, 41, 41);
        }

        #stroke-with-shadow h1 {
            text-shadow:
                -1px -1px 0 var(--stroke-color),
                0px -1px 0 var(--stroke-color),
                1px -1px 0 var(--stroke-color),
                -1px 0px 0 var(--stroke-color),
                1px 0px 0 var(--stroke-color),
                -1px 1px 0 var(--stroke-color),
                0px 1px 0 var(--stroke-color),
                1px 1px 0 var(--stroke-color);
            color: white;
        }

        #gradient h1 {
            background: linear-gradient(137deg, #e11d48, #f97316 50%, #eab308 100%);
            background-clip: text;
            color: transparent;
        }

        .imageInside {
            background-image: url("water.jpg");
            background-size: cover;
            background-position: center;
            background-clip: text;
            color: transparent;
            font-size: 6rem;
        }

        .strokeOnly {
            font-size: 6rem;
            text-shadow:
                -1px -1px 0 var(--stroke-color),
                0px -1px 0 var(--stroke-color),
                1px -1px 0 var(--stroke-color),
                -1px 0px 0 var(--stroke-color),
                1px 0px 0 var(--stroke-color),
                -1px 1px 0 var(--stroke-color),
                0px 1px 0 var(--stroke-color),
                1px 1px 0 var(--stroke-color);
        }

        #relativeParent {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #relativeParent h1 {
            position: absolute;
        }

        #reflections {
            background-color: black;
            color: white;
        }

        .reflectionDemoReflection {
            transform: scaleY(-1);
        }

        #reflectionsWrap {
            display: flex;
            flex-direction: column;
        }

        #reflectionsWrap h1 {
            margin: -1rem;
        }

        h1.reflectionDemoReflection {
            background: linear-gradient(to bottom, rgba(255, 255, 255, .25), transparent);
            background-clip: text;
            color: transparent;
        }

        #responsive h1 {
            font-size: clamp(1.5rem, 4vw, 5rem); /* Minimum, preferred, maximum */;
        }

        #responsive-text-wrap {
            overflow-wrap: anywhere;
        }
        
    </style>

</head>

<body>

    <div id="shadow" class="exampleContainer">
        <h1>Shadow</h1>
    </div>

    <div id="glow" class="exampleContainer">
        <h1>Glow</h1>
    </div>

    <div id="threedee" class="exampleContainer">
        <h1>3D</h1>
    </div>

    <div id="stroke" class="exampleContainer">
        <h1>Stroke</h1>
    </div>

    <div id="stroke-with-shadow" class="exampleContainer">
        <h1>Stroke with shadow</h1>
    </div>

    <div id="gradient" class="exampleContainer">
        <h1>Gradient</h1>
    </div>

    <div id="image-inside-text" class="exampleContainer">
        <div id="relativeParent">
            <h1 class="strokeOnly">Image inside text</h1>
            <h1 class="imageInside">Image inside text</h1>

        </div>

    </div>

    <div id="reflections" class="exampleContainer">
        <div id="reflectionsWrap">
            <h1 class="reflectionDemoNormal">Reflection</h1>
            <h1 class="reflectionDemoReflection">Reflection</h1>
        </div>
    </div>

    <div id="responsive" class="exampleContainer">
        <h1>Responsive Text</h1>
    </div>

    <div id="responsive-text-wrap" class="exampleContainer">
        <h1>Text that wraps anywhere</h1>
    </div>




</body>

</html>
